[project]
site_name = "Learning Wiki"
site_description = "A personal wiki — Blender, Unity, Godot, and adjacent."
site_author = "Michael"
# Update site_url after you've created the GitHub repo and enabled Pages,
# e.g. site_url = "https://<your-github-username>.github.io/<repo-name>/"
# site_url = ""

copyright = """
Copyright &copy; 2026 Michael
"""

nav = [
  { "Home" = "index.md" },
  { "Blender Shaders & Nodes" = [
    { "Overview"       = "blender-shaders-and-nodes/index.md" },
    { "Usage"          = "blender-shaders-and-nodes/usage.md" },
    { "Tutorial"       = "blender-shaders-and-nodes/tutorial.md" },
    { "Examples"       = "blender-shaders-and-nodes/examples.md" },
    { "Best Practices" = "blender-shaders-and-nodes/best-practices.md" },
    { "Learning"       = "blender-shaders-and-nodes/learning.md" },
  ] },
  { "Blender" = [
    { "Overview"       = "blender/index.md" },
    { "Usage"          = "blender/usage.md" },
    { "Tutorial"       = "blender/tutorial.md" },
    { "Topology"       = "blender/topology.md" },
    { "Examples"       = "blender/examples.md" },
    { "Best Practices" = "blender/best-practices.md" },
    { "Learning"       = "blender/learning.md" },
  ] },
  { "Unity" = [
    { "Overview"       = "unity/index.md" },
    { "Usage"          = "unity/usage.md" },
    { "Tutorial"       = "unity/tutorial.md" },
    { "Examples"       = "unity/examples.md" },
    { "Best Practices" = "unity/best-practices.md" },
    { "Learning"       = "unity/learning.md" },
  ] },
  { "Godot" = [
    { "Overview"       = "godot/index.md" },
    { "Usage"          = "godot/usage.md" },
    { "Tutorial"       = "godot/tutorial.md" },
    { "Examples"       = "godot/examples.md" },
    { "Best Practices" = "godot/best-practices.md" },
    { "Learning"       = "godot/learning.md" },
  ] },
]

[project.theme]
variant = "classic"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.share",
    "search.suggest",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
